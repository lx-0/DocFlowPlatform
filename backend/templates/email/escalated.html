<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Document Escalated to You</title></head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2 style="color: #e67e22;">A Document Has Been Escalated to You</h2>
  <p>A document has been escalated and requires your attention.</p>
  <table style="border-collapse: collapse; width: 100%; margin: 16px 0;">
    <tr>
      <td style="padding: 8px; font-weight: bold; width: 140px;">Document:</td>
      <td style="padding: 8px;">{{documentTitle}}</td>
    </tr>
    <tr style="background: #f5f5f5;">
      <td style="padding: 8px; font-weight: bold;">Document ID:</td>
      <td style="padding: 8px;">{{documentId}}</td>
    </tr>
  </table>
  <p><a href="/approver/queue" style="background: #e67e22; color: #fff; padding: 10px 20px; text-decoration: none; border-radius: 4px;">Review Escalated Document</a></p>
  <hr style="margin-top: 32px; border: none; border-top: 1px solid #ddd;">
  <p style="font-size: 12px; color: #888;">This is an automated notification from DocFlow.</p>
</body>
</html>
