<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocFlow — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,.12);
      padding: 2rem;
      width: 100%;
      max-width: 380px;
    }
    h1 { font-size: 1.4rem; margin-bottom: 1.5rem; color: #222; }
    label { display: block; font-size: .875rem; color: #555; margin-bottom: .25rem; }
    input {
      width: 100%;
      padding: .5rem .75rem;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 1rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: #4f46e5; }
    button {
      width: 100%;
      padding: .625rem;
      background: #4f46e5;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #4338ca; }
    .msg { margin-top: 1rem; font-size: .875rem; text-align: center; }
    .msg.error { color: #dc2626; }
    .msg.success { color: #16a34a; }
    .toggle { margin-top: 1rem; text-align: center; font-size: .875rem; color: #555; }
    .toggle a { color: #4f46e5; cursor: pointer; text-decoration: underline; }
  </style>
</head>
<body>
  <div class="card">
    <h1 id="form-title">Sign in to DocFlow</h1>
    <form id="auth-form">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com" required />
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" required />
      <button type="submit" id="submit-btn">Sign in</button>
      <div class="msg" id="msg"></div>
    </form>
    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a id="toggle-link">Register</a>
    </div>
  </div>

  <script>
    let mode = 'login'; // 'login' | 'register'

    document.getElementById('toggle-link').addEventListener('click', () => {
      mode = mode === 'login' ? 'register' : 'login';
      document.getElementById('form-title').textContent =
        mode === 'login' ? 'Sign in to DocFlow' : 'Create an account';
      document.getElementById('submit-btn').textContent =
        mode === 'login' ? 'Sign in' : 'Register';
      document.getElementById('toggle-text').textContent =
        mode === 'login' ? "Don't have an account?" : 'Already have an account?';
      document.getElementById('toggle-link').textContent =
        mode === 'login' ? 'Register' : 'Sign in';
      document.getElementById('msg').textContent = '';
    });

    document.getElementById('auth-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msgEl = document.getElementById('msg');
      msgEl.textContent = '';
      msgEl.className = 'msg';

      const endpoint = mode === 'login' ? '/api/auth/login' : '/api/auth/register';
      try {
        const res = await fetch(endpoint, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password }),
        });
        const data = await res.json();
        if (!res.ok) {
          msgEl.textContent = data.error || 'Something went wrong';
          msgEl.classList.add('error');
          return;
        }
        if (mode === 'login') {
          localStorage.setItem('token', data.token);
          msgEl.textContent = 'Signed in successfully!';
          msgEl.classList.add('success');
        } else {
          msgEl.textContent = 'Account created! You can now sign in.';
          msgEl.classList.add('success');
        }
      } catch {
        msgEl.textContent = 'Network error — is the server running?';
        msgEl.classList.add('error');
      }
    });
  </script>
</body>
</html>
